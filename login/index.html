<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineManager - Login</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>

    <main class="login-wrapper">
        <div class="login-container">
            <div class="login-header">
                <h2>Portal de Acesso</h2>
                <p>Insira suas credenciais para acessar o painel</p>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Usuário / Matrícula</label>
                    <input type="text" id="username" required placeholder="Ex: admin ou operador">
                </div>

                <div class="form-group">
                    <label for="password">Senha</label>
                    <input type="password" id="password" required placeholder="••••••••">
                </div>

                <button type="submit" class="btn-submit">Entrar no Sistema</button>
            </form>
            
            <div class="login-footer">
                <a href="../index.html">← Voltar ao início</a>
            </div>
        </div>
    </main>

    <script src="login.js"></script>
</body>
</html>
