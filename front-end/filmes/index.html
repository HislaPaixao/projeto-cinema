<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineManager - Gerenciar Filmes</title>
    <link rel="stylesheet" href="filmes.css">
</head>
<body>

    <div class="admin-container">
        <header class="admin-header">
            <div class="header-left">
                <a href="../login/index.html" class="btn-back">← Sair</a>
                <h1>Catálogo de Filmes</h1>
            </div>
            <a href="cadastro.html" class="btn-add">+ Novo Filme</a>
        </header>

        <section class="search-section">
            <input type="text" id="searchBar" placeholder="Digite o nome do filme para buscar...">
            <button id="btnSearch" class="btn-search">Buscar</button>
        </section>

        <main class="table-section">
            <table class="movies-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Título</th>
                        <th>Duração</th>
                        <th>Classificação</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="moviesTableBody">
                </tbody>
            </table>
        </main>
    </div>

    <script src="../js/api.js"></script>
    <script src="filmes.js"></script>
</body>
</html>
